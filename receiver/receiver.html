    <!--  Base45 实现 (RFC 9285) -->
    <script>
        (function(global) {
            const ALPHABET = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:';
            function encode(input) {
                if (typeof input === 'string') {
                    input = new TextEncoder().encode(input);
                }
                let result = [];
                let i = 0;
                while (i < input.length) {
                    if (i + 1 < input.length) {
                        let val = input[i] + (input[i+1] << 8);
                        let d0 = val % 45;
                        let d1 = Math.floor(val / 45) % 45;
                        let d2 = Math.floor(val / (45*45));
                        result.push(ALPHABET[d0], ALPHABET[d1], ALPHABET[d2]);
                        i += 2;
                    } else {
                        let val = input[i];
                        let d0 = val % 45;
                        let d1 = Math.floor(val / 45);
                        result.push(ALPHABET[d0], ALPHABET[d1]);
                        i += 1;
                    }
                }
                return result.join('');
            }
            function decode(base45Str) {
                const numbers = [];
                for (let i = 0; i < base45Str.length; i++) {
                    const idx = ALPHABET.indexOf(base45Str[i]);
                    if (idx === -1) throw new Error(`Invalid Base45 char: ${base45Str[i]}`);
                    numbers.push(idx);
                }
                const result = [];
                let i = 0;
                while (i < numbers.length) {
                    if (i + 2 < numbers.length) {
                        let val = numbers[i] + numbers[i+1] * 45 + numbers[i+2] * 45 * 45;
                        result.push(val & 0xFF, (val >> 8) & 0xFF);
                        i += 3;
                    } else if (i + 1 < numbers.length) {
                        let val = numbers[i] + numbers[i+1] * 45;
                        result.push(val & 0xFF);
                        i += 2;
                    } else {
                        throw new Error('Invalid Base45 length');
                    }
                }
                return new Uint8Array(result);
            }
            global.base45 = { encode, decode };
        })(window);
    </script>

<body>
<div class="app-container">
    <div class="header"><div class="logo">📱</div><h1>二维码文件接收器</h1><p class="subtitle">自动重组 | 断点续传</p></div>
    <div id="floatingContainer"></div>
    <div id="scanSection" class="scan-section">
        <div class="scan-window">
            <button id="closeScanBtn" class="scan-close-btn">×</button>
            <div class="video-container"><video id="videoElement" playsinline></video><div class="scan-overlay"><div class="scan-frame"></div></div></div>
        </div>
        <div class="scan-tips"><p>对准二维码 | 自动识别</p><p>先数据分片，最后文件名分片</p></div>
    </div>
    <div class="card">
        <div class="section-title">📷 1. 扫描设置</div>
        <select id="cameraSelect" class="camera-selector"><option value="">选择摄像头...</option></select>
        <button id="startScanBtn" class="btn btn-primary"><span id="scanBtnText">🚀 开始扫描</span><div id="scanStatus" style="font-size:12px;">就绪</div></button>
        <div class="manual-input-section"><p style="margin:15px 0 10px;">备用：手动输入JSON</p><textarea id="manualData" placeholder='{"i":0,"t":5,"f":"abc12","h":"xyz89","d":"..."}'></textarea><button id="submitManualBtn" class="btn btn-primary">✅ 提交</button></div>
    </div>
    <div class="card">
        <div class="section-title">📊 2. 接收进度</div>
        <div id="currentFingerprint" class="fingerprint-display" style="display:none;"><strong>文件指纹:</strong> <span id="fingerprintValue">未设置</span></div>
        <div id="status" class="status-message status-info">等待扫描</div>
        <div class="progress-section"><div class="progress-info"><span>进度: <span id="receivedCount">0</span>/<span id="totalCount">0</span></span><span id="percentage">0%</span></div><div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div></div>
        <div id="chunksDisplay" class="chunks-grid"></div>
    </div>
    <div class="card">
        <div class="section-title">💾 3. 文件信息</div>
        <div id="fileInfo" class="file-info">
            <p><strong>文件名:</strong> <span id="fileName">未知</span></p><p><strong>大小:</strong> <span id="fileSize">未知</span></p><p><strong>类型:</strong> <span id="fileType">未知</span></p><p><strong>接收时间:</strong> <span id="receiveTime">未知</span></p><p><strong>数据分片:</strong> <span id="dataChunksCount">0</span></p>
        </div>
        <div class="action-buttons"><button id="clearBtn" class="btn btn-danger">🗑️ 清除数据</button></div>
        <div id="downloadSection" class="hidden" style="margin-top:15px;"><button id="downloadBtn" class="btn btn-primary">⬇️ 下载文件</button></div>
    </div>
    <div class="footer"><p>扫描完成后自动重组 | 支持断点续传</p><p>Base45 高效编码</p></div>
</div>
<script>

    let receivedDataChunks = new Map();
    let fileNameData = null;
    let totalDataChunks = 0;
    let currentFileFingerprint = null;
    let isProcessing = false;
    let receivedFileName = '';
    let receivedFileSize = 0;
    let isScanning = false;
    let codeReader = null;
    let scanControls = null;
    let lastDecodedText = '';
    let lastScanTime = 0;
    let base45 = window.base45;

    // 辅助函数
    function calculateCRC32(data) {
        if (typeof pako !== 'undefined' && pako.crc32) return pako.crc32(data).toString(36).padStart(5,'0').slice(-5);
        const table = new Uint32Array(256);
        for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=(c&1)?0xEDB88320^(c>>>1):c>>>1;table[i]=c;}
        let crc=0xFFFFFFFF;
        for(let i=0;i<data.length;i++) crc = (crc>>>8) ^ table[(crc ^ data.charCodeAt(i)) & 0xFF];
        crc = (crc ^ 0xFFFFFFFF) >>> 0;
        return crc.toString(36).padStart(5,'0').slice(-5);
    }
    function decodeFileName(base64Name){
        try{
            const binaryStr = atob(base64Name);
            const bytes = new Uint8Array(binaryStr.length);
            for(let i=0;i<binaryStr.length;i++) bytes[i]=binaryStr.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        }catch(e){
            try{ return decodeURIComponent(escape(atob(base64Name))); }catch(e2){ return base64Name; }
        }
    }
    // DOM 元素获取
    const videoElement = document.getElementById('videoElement');
    const cameraSelect = document.getElementById('cameraSelect');
    const startScanBtn = document.getElementById('startScanBtn');
    const scanBtnText = document.getElementById('scanBtnText');
    const scanStatus = document.getElementById('scanStatus');
    const scanSection = document.getElementById('scanSection');
    const closeScanBtn = document.getElementById('closeScanBtn');
    const statusDiv = document.getElementById('status');
    const receivedCountSpan = document.getElementById('receivedCount');
    const totalCountSpan = document.getElementById('totalCount');
    const percentageSpan = document.getElementById('percentage');
    const progressFill = document.getElementById('progressFill');
    const chunksDisplay = document.getElementById('chunksDisplay');
    const fileInfoDiv = document.getElementById('fileInfo');
    const fileNameSpan = document.getElementById('fileName');
    const fileSizeSpan = document.getElementById('fileSize');
    const fileTypeSpan = document.getElementById('fileType');
    const receiveTimeSpan = document.getElementById('receiveTime');
    const dataChunksCountSpan = document.getElementById('dataChunksCount');
    const clearBtn = document.getElementById('clearBtn');
    const downloadSection = document.getElementById('downloadSection');
    const downloadBtn = document.getElementById('downloadBtn');
    const manualData = document.getElementById('manualData');
    const submitManualBtn = document.getElementById('submitManualBtn');
    const floatingContainer = document.getElementById('floatingContainer');
    const currentFingerprintDiv = document.getElementById('currentFingerprint');
    const fingerprintValueSpan = document.getElementById('fingerprintValue');
    const { BrowserQRCodeReader } = ZXing;

    // 界面消息函数
    function showFloatingMessage(msg, isError=false){
        const div = document.createElement('div');
        div.className = `floating-message ${isError ? 'floating-error' : ''}`;
        div.textContent = msg;
        floatingContainer.appendChild(div);
        setTimeout(()=>div.parentNode?.removeChild(div),1500);
    }
    function showStatus(msg, type){
        statusDiv.textContent = msg;
        statusDiv.className = 'status-message';
        if(type==='success') statusDiv.classList.add('status-success');
        else if(type==='error') statusDiv.classList.add('status-error');
        else statusDiv.classList.add('status-info');
    }

    // 页面初始化
    document.addEventListener('DOMContentLoaded', async()=>{
        console.log('Receiver loaded');
        if(typeof ZXing==='undefined' || !BrowserQRCodeReader) showStatus('ZXing库加载失败','error');
        await initCameraList();
        await loadSavedChunks();
        updateUI();
    });

    async function initCameraList(){
        try{
            let devices = [];
            try{ devices = await BrowserQRCodeReader.listVideoInputDevices(); }
            catch(e){ const native = await navigator.mediaDevices.enumerateDevices(); devices = native.filter(d=>d.kind==='videoinput'); }
            cameraSelect.innerHTML = '<option value="">选择摄像头...</option>';
            devices.forEach((d,idx)=>{ let opt = document.createElement('option'); opt.value = d.deviceId; opt.text = d.label || `摄像头 ${idx+1}`; cameraSelect.appendChild(opt); });
            if(devices.length===0) scanStatus.textContent = '未找到摄像头';
            else scanStatus.textContent = `找到 ${devices.length} 个摄像头`;
        }catch(err){ console.error(err); scanStatus.textContent = '摄像头检测失败'; }
    }

    startScanBtn.addEventListener('click', async()=>{
        if(isProcessing) return;
        if(isScanning){ await stopScanning(); return; }
        isProcessing=true;
        try{
            startScanBtn.disabled=true;
            scanBtnText.textContent = '⏳ 启动...';
            scanSection.classList.add('active');
            const deviceId = cameraSelect.value || undefined;
            codeReader = new BrowserQRCodeReader({ tryHarder: true, formats: [ZXing.BarcodeFormat.QR_CODE] });
            scanControls = await codeReader.decodeFromVideoDevice(deviceId, videoElement, (result, error, controls)=>{
                if(result) handleScanResult(result.getText());
                if(error && !error.message?.includes('NotFound') && !error.message?.includes('No QR')) console.log(error);
                if(controls && !scanControls) scanControls = controls;
            });
            isScanning=true;
            startScanBtn.disabled=false;
            scanBtnText.textContent = '⏹️ 停止扫描';
            scanStatus.textContent = '扫描中...';
            showStatus('扫描已启动','success');
        }catch(err){
            console.error(err);
            if(err.name==='NotAllowedError') showStatus('请允许摄像头权限','error');
            else showStatus('启动失败: '+err.message,'error');
            await stopScanning();
            startScanBtn.disabled=false;
            scanBtnText.textContent = '🚀 开始扫描';
        } finally { isProcessing=false; }
    });

    function handleScanResult(decodedText){
        const now = Date.now();
        if(now-lastScanTime < 1000 && decodedText===lastDecodedText) return;
        lastScanTime=now; lastDecodedText=decodedText;
        scanSection.classList.add('scan-success');
        setTimeout(()=>scanSection.classList.remove('scan-success'),300);
        processChunkData(decodedText);
    }

    async function stopScanning(){
        isScanning=false;
        if(scanControls?.stop) scanControls.stop();
        if(codeReader?.reset) codeReader.reset();
        if(videoElement.srcObject){
            videoElement.srcObject.getTracks().forEach(t=>t.stop());
            videoElement.srcObject=null;
        }
        scanControls=null; codeReader=null;
        scanSection.classList.remove('active');
        scanBtnText.textContent = '🚀 开始扫描';
        startScanBtn.disabled=false;
        showStatus('扫描已停止','info');
    }
    closeScanBtn.addEventListener('click', stopScanning);

    // 处理扫描到的数据（重组函数中改为按字节解码）
    async function processChunkData(data){
        try{
            let trimmed = data.trim();
            if(!trimmed.startsWith('{') && trimmed.includes('{')) trimmed = trimmed.substring(trimmed.indexOf('{'));
            if(!trimmed.endsWith('}') && trimmed.includes('}')) trimmed = trimmed.substring(0, trimmed.lastIndexOf('}')+1);
            if(!trimmed.startsWith('{') || !trimmed.endsWith('}')) throw new Error('无效JSON');
            const chunk = JSON.parse(trimmed);
            if(chunk.t === 'fn'){
                // 文件名分片
                if(typeof chunk.f !== 'string' || typeof chunk.n !== 'string' || typeof chunk.s !== 'number' || typeof chunk.h !== 'string') throw new Error('文件名格式错误');
                const crcData = { t: chunk.t, f: chunk.f, n: chunk.n, s: chunk.s, ts: chunk.ts, tc: chunk.tc };
                const calcHash = calculateCRC32(JSON.stringify(crcData));
                if(calcHash !== chunk.h.toLowerCase()){ showFloatingMessage('文件名校验失败',true); return; }
                if(currentFileFingerprint && chunk.f !== currentFileFingerprint){ showFloatingMessage('文件指纹不匹配',true); return; }
                fileNameData = chunk;
                receivedFileName = decodeFileName(chunk.n);
                if(!currentFileFingerprint){ currentFileFingerprint = chunk.f; fingerprintValueSpan.textContent = currentFileFingerprint; currentFingerprintDiv.style.display = 'block'; }
                totalDataChunks = chunk.tc || 0;
                receivedFileSize = chunk.s;
                const store = localforage.createInstance({ name: 'qrcode-filename-separate' });
                await store.setItem('fileNameData', fileNameData);
                await store.setItem('fileName', receivedFileName);
                await store.setItem('fileSize', receivedFileSize);
                await store.setItem('totalDataChunks', totalDataChunks);
                await store.setItem('receiveTime', new Date().toISOString());
                receiveTimeSpan.textContent = new Date().toLocaleString();
                showFloatingMessage('📄 文件名分片接收成功');
                showStatus(`文件名: ${receivedFileName}`, 'success');
            } else {
                // 数据分片
                if(typeof chunk.i !== 'number' || typeof chunk.t !== 'number' || typeof chunk.h !== 'string' || typeof chunk.d !== 'string' || typeof chunk.f !== 'string') throw new Error('数据分片格式错误');
                if(!currentFileFingerprint){ currentFileFingerprint = chunk.f; fingerprintValueSpan.textContent = currentFileFingerprint; currentFingerprintDiv.style.display = 'block'; }
                else if(chunk.f !== currentFileFingerprint){ showFloatingMessage('二维码不属于当前文件',true); return; }
                const calcHash = calculateCRC32(chunk.d);
                if(calcHash !== chunk.h.toLowerCase()){ showFloatingMessage(`分片 ${chunk.i+1} 校验失败`,true); return; }
                if(receivedDataChunks.has(chunk.i)){ showFloatingMessage(`分片 ${chunk.i+1} 已存在`); return; }
                if(totalDataChunks === 0) totalDataChunks = chunk.t;
                receivedDataChunks.set(chunk.i, chunk);
                const store = localforage.createInstance({ name: 'qrcode-filename-separate' });
                await store.setItem(`dataChunk_${chunk.i}`, chunk);
                showFloatingMessage(`✅ 数据分片 ${chunk.i+1}/${chunk.t}`);
            }
            updateUI();
            checkCompletion();
        } catch(err){ console.error(err); showFloatingMessage('处理失败',true); }
    }

    async function checkCompletion(){
        if(fileNameData && totalDataChunks>0 && receivedDataChunks.size >= totalDataChunks){
            showStatus('所有分片接收完成，正在自动重组...','success');
            showFloatingMessage('🎉 接收完成，重组中...');
            await assembleFileAutomatically();
            setTimeout(()=>stopScanning(),500);
        }
    }

    // 重组时先对每个分片的Base45解码得到字节，再拼接所有字节，最后解压
    async function assembleFileAutomatically(){
        try{
            if(!fileNameData){ showStatus('缺少文件名数据','error'); return; }
            if(receivedDataChunks.size < totalDataChunks){ showStatus(`缺少 ${totalDataChunks-receivedDataChunks.size} 个分片`,'error'); return; }
            // 收集所有字节（先解码每个分片的Base45）
            let allBytes = [];
            for(let i=0;i<totalDataChunks;i++){
                const chunk = receivedDataChunks.get(i);
                if(!chunk?.d) throw new Error(`缺少分片 ${i+1}`);
                const decodedBytes = base45.decode(chunk.d);
                for(let b of decodedBytes) allBytes.push(b);
            }
            const compressedBytes = new Uint8Array(allBytes);
            let decompressed;
            try{ decompressed = pako.inflate(compressedBytes); } catch(e){ decompressed = compressedBytes; }
            const blob = new Blob([decompressed]);
            const url = URL.createObjectURL(blob);
            fileNameSpan.textContent = receivedFileName;
            fileSizeSpan.textContent = (decompressed.length < 1024) ? decompressed.length+' B' : (decompressed.length/1024).toFixed(1)+' KB';
            fileTypeSpan.textContent = receivedFileName.split('.').pop().toUpperCase()+' 文件';
            dataChunksCountSpan.textContent = totalDataChunks;
            fileInfoDiv.style.display = 'block';
            downloadSection.classList.remove('hidden');
            downloadBtn.onclick = ()=>{
                const a = document.createElement('a');
                a.href = url;
                a.download = receivedFileName;
                a.click();
                setTimeout(()=>URL.revokeObjectURL(url),100);
                showFloatingMessage('⬇️ 下载开始');
            };
            showStatus('文件重组完成，可下载','success');
            showFloatingMessage('重组完成！');
        } catch(err){
            console.error(err);
            showStatus('重组失败: '+err.message,'error');
            showFloatingMessage('重组失败，请重试',true);
        }
    }


    submitManualBtn.addEventListener('click', ()=>{
        const val = manualData.value.trim();
        if(val){ processChunkData(val); manualData.value=''; }
        else showStatus('请输入数据','error');
    });

    async function loadSavedChunks(){
        try{
            const store = localforage.createInstance({ name: 'qrcode-filename-separate' });
            const keys = await store.keys();
            const savedFileName = await store.getItem('fileNameData');
            if(savedFileName){
                fileNameData = savedFileName;
                receivedFileName = decodeFileName(fileNameData.n);
                receivedFileSize = fileNameData.s;
                currentFileFingerprint = fileNameData.f;
                totalDataChunks = fileNameData.tc || 0;
                fingerprintValueSpan.textContent = currentFileFingerprint;
                currentFingerprintDiv.style.display = 'block';
                const savedTime = await store.getItem('receiveTime');
                receiveTimeSpan.textContent = savedTime ? new Date(savedTime).toLocaleString() : new Date().toLocaleString();
            }
            for(const key of keys){
                if(key.startsWith('dataChunk_')){
                    const id = parseInt(key.replace('dataChunk_',''));
                    const chunk = await store.getItem(key);
                    if(chunk) receivedDataChunks.set(id, chunk);
                }
            }
            console.log(`加载了 ${receivedDataChunks.size} 个数据分片`);
        } catch(e){ console.error(e); }
    }

    function updateUI(){
        const totalReceived = receivedDataChunks.size + (fileNameData?1:0);
        const totalToReceive = totalDataChunks + 1;
        receivedCountSpan.textContent = totalReceived;
        totalCountSpan.textContent = totalToReceive;
        const percent = totalToReceive>0 ? Math.round((totalReceived/totalToReceive)*100) : 0;
        percentageSpan.textContent = percent+'%';
        progressFill.style.width = percent+'%';
        updateChunksDisplay();
        if(fileNameData){
            fileNameSpan.textContent = receivedFileName;
            fileSizeSpan.textContent = formatFileSize(receivedFileSize);
            fileTypeSpan.textContent = getFileTypeFromName(receivedFileName);
            dataChunksCountSpan.textContent = totalDataChunks;
            fileInfoDiv.style.display = 'block';
        }
    }
    function updateChunksDisplay(){
        if(totalDataChunks===0 && !fileNameData){ chunksDisplay.innerHTML = '<div style="text-align:center;">暂无分片</div>'; return; }
        let html='';
        for(let i=0;i<totalDataChunks;i++){
            const rec = receivedDataChunks.has(i);
            html += `<div class="chunk-item ${rec?'chunk-received':'chunk-missing'}" title="数据分片 ${i+1}${rec?' 已接收':' 未接收'}">${i+1}</div>`;
        }
        html += `<div class="chunk-item ${fileNameData?'chunk-filename':'chunk-missing'}" title="文件名分片">📄</div>`;
        chunksDisplay.innerHTML = html;
    }
    clearBtn.addEventListener('click', async()=>{
        if(confirm('清除所有接收数据？')){
            await stopScanning();
            const store = localforage.createInstance({ name: 'qrcode-filename-separate' });
            await store.clear();
            receivedDataChunks.clear();
            fileNameData=null; totalDataChunks=0; currentFileFingerprint=null; receivedFileName=''; receivedFileSize=0;
            currentFingerprintDiv.style.display='none';
            fileInfoDiv.style.display='none';
            downloadSection.classList.add('hidden');
            receiveTimeSpan.textContent='未知';
            updateUI();
            showStatus('数据已清除','info');
        }
    });
    function formatFileSize(bytes){
        if(bytes<1024) return bytes+' B';
        if(bytes<1048576) return (bytes/1024).toFixed(1)+' KB';
        return (bytes/1048576).toFixed(1)+' MB';
    }
    function getFileTypeFromName(name){
        const ext = name.split('.').pop().toLowerCase();
        const map = {txt:'文本', pdf:'PDF', jpg:'图片', jpeg:'图片', png:'图片', gif:'图片', zip:'压缩包', rar:'压缩包', doc:'Word', docx:'Word', xls:'Excel', xlsx:'Excel', ppt:'PPT', pptx:'PPT', mp3:'音频', mp4:'视频', js:'JS', html:'网页', css:'样式', json:'JSON' };
        return map[ext] || '文件';
    }
    updateUI();
</script>
