<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线二维码文件传输系统 - V2.1</title>
    <script src="js/pako.min.js"></script>
    <script src="js/qrcode.min.js"></script>
    <style>
        /* 完全保留您原版的样式，不做任何改动 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f7fa;
            color: #333;
            height: 100vh;
            overflow: hidden;
        }
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        /* 左侧设置面板 400px */
        .settings-panel {
            width: 400px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px 20px;
            box-shadow: 2px 0 12px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        /* 右侧二维码区 */
        .qr-panel {
            flex: 1;
            display: flex;
            align-items: stretch;
            justify-content: center;
            background: #f8f9fa;
            padding: 20px;
            overflow-y: auto;
        }
        .qr-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.12);
            text-align: center;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px 30px;
        }
        .qr-image {
            margin: 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
        }
        .qr-image img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin: 20px 0 16px;
        }
        .nav-btn {
            background: #3498db;
            border: none;
            color: white;
            font-size: 26px;
            font-weight: bold;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .nav-btn:active { transform: scale(0.96); }
        .nav-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
        .page-info {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            background: #ecf0f1;
            display: inline-block;
            padding: 10px 28px;
            border-radius: 48px;
        }
        .footer-note {
            margin-top: 12px;
            font-size: 14px;
            color: #5d6d7e;
            text-align: center;
        }
        /* 左侧卡片样式 */
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card h3 {
            margin-bottom: 16px;
            color: #2c3e50;
            font-size: 18px;
            border-left: 4px solid #3498db;
            padding-left: 12px;
        }
        #fileInput {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 12px 0;
            border: 2px dashed #3498db;
            border-radius: 8px;
            background: #e8f4fc;
            cursor: pointer;
        }
        .file-info {
            margin-top: 12px;
            padding: 12px;
            background: #e8f4fc;
            border-left: 4px solid #3498db;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 16px 0;
        }
        .slider-value {
            min-width: 80px;
            background: white;
            border: 1px solid #3498db;
            border-radius: 20px;
            padding: 4px 12px;
            text-align: center;
            font-weight: bold;
            color: #3498db;
        }
        input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #e0e0e0;
            border-radius: 3px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #3498db;
            border-radius: 50%;
            cursor: pointer;
        }
        .size-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 6px;
        }
        .warning-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px;
            font-size: 13px;
            color: #856404;
            margin: 12px 0;
            border-radius: 6px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(52,152,219,0.3);
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #555;
        }
        .btn-secondary:hover { background: #d0d0d0; }
        .control-group {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .control-group .btn { flex: 1; }
        .status {
            padding: 10px;
            background: #d1ecf1;
            border-radius: 8px;
            color: #0c5460;
            font-size: 14px;
            text-align: center;
        }
        .settings-panel::-webkit-scrollbar { width: 6px; }
        .settings-panel::-webkit-scrollbar-track { background: #f1f1f1; }
        .settings-panel::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
    </style>
    <!--  Base45 实现 (RFC 9285) -->
    <script>
        (function(global) {
            const ALPHABET = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:';
            function encode(input) {
                if (typeof input === 'string') {
                    input = new TextEncoder().encode(input);
                }
                let result = [];
                let i = 0;
                while (i < input.length) {
                    if (i + 1 < input.length) {
                        let val = input[i] + (input[i+1] << 8);
                        let d0 = val % 45;
                        let d1 = Math.floor(val / 45) % 45;
                        let d2 = Math.floor(val / (45*45));
                        result.push(ALPHABET[d0], ALPHABET[d1], ALPHABET[d2]);
                        i += 2;
                    } else {
                        let val = input[i];
                        let d0 = val % 45;
                        let d1 = Math.floor(val / 45);
                        result.push(ALPHABET[d0], ALPHABET[d1]);
                        i += 1;
                    }
                }
                return result.join('');
            }
            function decode(base45Str) {
                const numbers = [];
                for (let i = 0; i < base45Str.length; i++) {
                    const idx = ALPHABET.indexOf(base45Str[i]);
                    if (idx === -1) throw new Error(`Invalid Base45 char: ${base45Str[i]}`);
                    numbers.push(idx);
                }
                const result = [];
                let i = 0;
                while (i < numbers.length) {
                    if (i + 2 < numbers.length) {
                        let val = numbers[i] + numbers[i+1] * 45 + numbers[i+2] * 45 * 45;
                        result.push(val & 0xFF, (val >> 8) & 0xFF);
                        i += 3;
                    } else if (i + 1 < numbers.length) {
                        let val = numbers[i] + numbers[i+1] * 45;
                        result.push(val & 0xFF);
                        i += 2;
                    } else {
                        throw new Error('Invalid Base45 length');
                    }
                }
                return new Uint8Array(result);
            }
            global.base45 = { encode, decode };
        })(window);
    </script>
</head>
<body>
<div class="app">
    <div class="settings-panel">
        <div class="card">
            <h3>📁 1. 选择文件</h3>
            <input type="file" id="fileInput">
            <div id="fileInfo" class="file-info">
                <strong>已选择文件:</strong> <span id="fileName"></span><br>
                <strong>文件大小:</strong> <span id="fileSize"></span><br>
                <strong>文件类型:</strong> <span id="fileType"></span><br>
                <div id="fingerprintInfo" style="display:none; margin-top:8px;">
                    <strong>文件指纹:</strong> <span id="fileFingerprint"></span>
                </div>
            </div>
        </div>
        <div class="card">
            <h3>⚙️ 2. 分片大小 (字节数)</h3>
            <div class="slider-container">
                <input type="range" id="chunkSizeSlider" min="800" max="1800" value="1200" step="25">
                <div id="chunkSizeValue" class="slider-value">1200 字节</div>
            </div>
            <div class="size-info">
                <span>小 (800)</span><span>推荐 (1200)</span><span>大 (1800)</span>
            </div>
            <div class="warning-box">
                ⚠️ 每个分片的JSON必须小于1800字符，字节分片后Base45编码长度约增加22%。
            </div>
            <div id="estimatedInfo" style="margin-top:12px; color:#3498db; font-weight:500;">
                预估二维码: <span id="estimatedChunks">--</span> 个数据 + 1文件名
            </div>
        </div>
        <div class="card">
            <h3>🔍 3. 二维码尺寸</h3>
            <div class="slider-container">
                <input type="range" id="qrSizeSlider" min="400" max="1000" value="600" step="20">
                <div id="qrSizeValue" class="slider-value">600 px</div>
            </div>
            <div class="size-info">
                <span>小 (400px)</span><span>大 (1000px)</span>
            </div>
        </div>
        <div class="control-group">
            <button id="startBtn" class="btn btn-primary">🚀 生成二维码</button>
            <button id="resetBtn" class="btn btn-secondary">🔄 重置</button>
        </div>
        <div id="status" class="status">ℹ️ 请选择一个文件</div>
        <div class="footer-note" style="margin-top: 20px;">
            💡 支持键盘 ← ↑ / → ↓ 切换 | 鼠标滚轮切换
        </div>
    </div>
    <div class="qr-panel">
        <div class="qr-card">
            <div class="qr-image" id="qrImageContainer">
                <div style="color:#7f8c8d; padding:80px 20px; font-size:18px;">点击「生成二维码」后显示</div>
            </div>
            <div class="nav-buttons">
                <button id="prevBtn" class="nav-btn" disabled>◀</button>
                <span id="pageInfo" class="page-info">0 / 0</span>
                <button id="nextBtn" class="nav-btn" disabled>▶</button>
            </div>
            <div class="footer-note">
                当前文件: <span id="currentFileName">未生成</span>
            </div>
        </div>
    </div>
</div>
<script>
    // 全局配置
    const CONFIG = {
        CHUNK_SIZE_BYTES: 400,   // 改为字节数
        QR_DISPLAY_SIZE: 500,
        QR_GENERATE_SIZE: 500,
        MAX_JSON_SIZE: 1800,
        QR_MAX_CAPACITY: 2953,
        PACKET_TYPES: { DATA: 'data', FILENAME: 'fn' }
    };
    let file = null;
    let chunks = [];
    let fileNameQrCode = null;
    let fileFingerprint = '';
    let originalFileName = '';
    let originalFileSize = 0;
    let currentIndex = 0;
    let totalQRCodes = 0;
    let qrCodeImages = [];

    // DOM 元素
    const fileInput = document.getElementById('fileInput');
    const fileInfoDiv = document.getElementById('fileInfo');
    const fileNameSpan = document.getElementById('fileName');
    const fileSizeSpan = document.getElementById('fileSize');
    const fileTypeSpan = document.getElementById('fileType');
    const fingerprintInfoDiv = document.getElementById('fingerprintInfo');
    const fileFingerprintSpan = document.getElementById('fileFingerprint');
    const chunkSizeSlider = document.getElementById('chunkSizeSlider');
    const chunkSizeValue = document.getElementById('chunkSizeValue');
    const estimatedChunksSpan = document.getElementById('estimatedChunks');
    const qrSizeSlider = document.getElementById('qrSizeSlider');
    const qrSizeValue = document.getElementById('qrSizeValue');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusDiv = document.getElementById('status');
    const qrImageContainer = document.getElementById('qrImageContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageInfoSpan = document.getElementById('pageInfo');
    const currentFileNameSpan = document.getElementById('currentFileName');

    // 辅助函数
    function generateShortFileId() {
        const timestamp = Date.now();
        const random = Math.floor(Math.random() * 46656);
        const combined = (timestamp % 60466176) * 1000 + random;
        return combined.toString(36).padStart(5, '0').slice(-5);
    }
    function calculateCRC32(data) {
        if (typeof pako !== 'undefined' && pako.crc32) {
            return pako.crc32(data).toString(36).padStart(5, '0').slice(-5);
        }
        const table = new Uint32Array(256);
        for (let i = 0; i < 256; i++) {
            let c = i;
            for (let j = 0; j < 8; j++) c = (c & 1) ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
            table[i] = c;
        }
        let crc = 0xFFFFFFFF;
        for (let i = 0; i < data.length; i++) crc = (crc >>> 8) ^ table[(crc ^ data.charCodeAt(i)) & 0xFF];
        crc = (crc ^ 0xFFFFFFFF) >>> 0;
        return crc.toString(36).padStart(5, '0').slice(-5);
    }
    function encodeFileName(filename) {
        try {
            const encoder = new TextEncoder();
            const encoded = encoder.encode(filename);
            return btoa(String.fromCharCode(...encoded));
        } catch(e) {
            return btoa(unescape(encodeURIComponent(filename)));
        }
    }
    function readFileAsArrayBuffer(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    }
    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    function showError(msg) { statusDiv.innerHTML = `❌ ${msg}`; statusDiv.className = 'status status-error'; statusDiv.style.background = '#f8d7da'; statusDiv.style.color = '#721c24'; }
    function showSuccess(msg) { statusDiv.innerHTML = `✅ ${msg}`; statusDiv.className = 'status status-success'; statusDiv.style.background = '#d4edda'; statusDiv.style.color = '#155724'; }
    function showInfo(msg) { statusDiv.innerHTML = `ℹ️ ${msg}`; statusDiv.className = 'status status-info'; statusDiv.style.background = '#d1ecf1'; statusDiv.style.color = '#0c5460'; }

    // 更新预估（根据字节分片）
    function updateChunkEstimation() {
        if (!file) { estimatedChunksSpan.textContent = '--'; return; }
        const estimatedCompressedSize = file.size * 0.6; // 粗略估计压缩后大小
        const estimated = Math.ceil(estimatedCompressedSize / CONFIG.CHUNK_SIZE_BYTES);
        estimatedChunksSpan.textContent = estimated + ' + 1';
    }

    // 生成二维码序列（关键修改：先按字节分片，再对每个分片独立Base45编码）
    async function generateAllQRCodes() {
        const fileBuffer = await readFileAsArrayBuffer(file);
        const compressed = pako.deflate(new Uint8Array(fileBuffer), { level: 9 });
        const compressedBytes = new Uint8Array(compressed);
        const totalDataChunks = Math.ceil(compressedBytes.length / CONFIG.CHUNK_SIZE_BYTES);
        chunks = [];
        for (let i = 0; i < totalDataChunks; i++) {
            const start = i * CONFIG.CHUNK_SIZE_BYTES;
            const end = Math.min(start + CONFIG.CHUNK_SIZE_BYTES, compressedBytes.length);
            const chunkBytes = compressedBytes.slice(start, end);
            const chunkBase45 = base45.encode(chunkBytes);
            const crc = calculateCRC32(chunkBase45);
            chunks.push({ i, t: totalDataChunks, h: crc, f: fileFingerprint, d: chunkBase45 });
        }
        // 文件名分片
        const encodedName = encodeFileName(originalFileName);
        const fileNameData = {
            t: CONFIG.PACKET_TYPES.FILENAME,
            f: fileFingerprint,
            n: encodedName,
            s: originalFileSize,
            ts: Date.now(),
            tc: totalDataChunks
        };
        const crcData = { t: fileNameData.t, f: fileNameData.f, n: fileNameData.n, s: fileNameData.s, ts: fileNameData.ts, tc: fileNameData.tc };
        fileNameData.h = calculateCRC32(JSON.stringify(crcData));
        fileNameQrCode = fileNameData;
        totalQRCodes = chunks.length + 1;
        qrCodeImages = new Array(totalQRCodes);
        qrImageContainer.innerHTML = '';
        for (let idx = 0; idx < chunks.length; idx++) {
            await generateSingleQR(idx, chunks[idx], 'data');
        }
        await generateSingleQR(chunks.length, fileNameQrCode, 'filename');
        currentIndex = 0;
        updateNavigationButtons();
        showQRAtIndex(currentIndex);
        currentFileNameSpan.textContent = originalFileName;
        showSuccess(`生成成功！共 ${totalQRCodes} 个二维码`);
    }

    // 生成单个二维码图片
    function generateSingleQR(index, chunk, type) {
        return new Promise((resolve) => {
            const jsonStr = JSON.stringify(chunk);
            const tempDiv = document.createElement('div');
            tempDiv.style.display = 'none';
            document.body.appendChild(tempDiv);
            const qrColor = (type === 'filename') ? '#1a5276' : '#000000';
            new QRCode(tempDiv, {
                text: jsonStr,
                width: CONFIG.QR_GENERATE_SIZE,
                height: CONFIG.QR_GENERATE_SIZE,
                colorDark: qrColor,
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.L
            });
            setTimeout(() => {
                const canvas = tempDiv.querySelector('canvas');
                let img = null;
                if (canvas) {
                    const dataUrl = canvas.toDataURL('image/png');
                    img = document.createElement('img');
                    img.src = dataUrl;
                    img.style.width = CONFIG.QR_DISPLAY_SIZE + 'px';
                    img.style.height = CONFIG.QR_DISPLAY_SIZE + 'px';
                    img.style.display = 'block';
                    img.style.margin = '0 auto';
                } else {
                    img = document.createElement('div');
                    img.textContent = '生成失败';
                    img.style.width = CONFIG.QR_DISPLAY_SIZE + 'px';
                    img.style.height = CONFIG.QR_DISPLAY_SIZE + 'px';
                    img.style.background = '#f8d7da';
                    img.style.display = 'flex';
                    img.style.alignItems = 'center';
                    img.style.justifyContent = 'center';
                }
                qrCodeImages[index] = img;
                document.body.removeChild(tempDiv);
                resolve();
            }, 50);
        });
    }


    function showQRAtIndex(index) {
        qrImageContainer.innerHTML = '';
        if (qrCodeImages[index]) {
            qrImageContainer.appendChild(qrCodeImages[index]);
        } else {
            qrImageContainer.innerHTML = '<div style="color:#7f8c8d;">二维码加载失败</div>';
        }
        pageInfoSpan.textContent = `${index+1} / ${totalQRCodes}`;
        updateNavigationButtons();
    }
    function updateNavigationButtons() {
        prevBtn.disabled = (currentIndex <= 0);
        nextBtn.disabled = (currentIndex >= totalQRCodes - 1);
    }
    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            showQRAtIndex(currentIndex);
        }
    }
    function goNext() {
        if (currentIndex < totalQRCodes - 1) {
            currentIndex++;
            showQRAtIndex(currentIndex);
        }
    }
    function onKeyDown(e) {
        if (totalQRCodes === 0) return;
        const key = e.key;
        if (key === 'ArrowLeft' || key === 'ArrowUp') {
            e.preventDefault();
            goPrev();
        } else if (key === 'ArrowRight' || key === 'ArrowDown') {
            e.preventDefault();
            goNext();
        }
    }
    let wheelTimer = null;
    function onWheel(e) {
        if (totalQRCodes === 0) return;
        e.preventDefault();
        if (wheelTimer) return;
        wheelTimer = setTimeout(() => { wheelTimer = null; }, 300);
        if (e.deltaY > 0) goNext();
        else if (e.deltaY < 0) goPrev();
    }
    function bindEvents() {
        window.addEventListener('keydown', onKeyDown);
        const qrPanel = document.querySelector('.qr-panel');
        qrPanel.addEventListener('wheel', onWheel, { passive: false });
        prevBtn.addEventListener('click', goPrev);
        nextBtn.addEventListener('click', goNext);
    }
    function reset() {
        file = null;
        chunks = [];
        fileNameQrCode = null;
        fileFingerprint = '';
        originalFileName = '';
        originalFileSize = 0;
        currentIndex = 0;
        totalQRCodes = 0;
        qrCodeImages = [];
        fileInfoDiv.style.display = 'none';
        fingerprintInfoDiv.style.display = 'none';
        qrImageContainer.innerHTML = '<div style="color:#7f8c8d; padding:80px 20px; font-size:18px;">点击「生成二维码」后显示</div>';
        pageInfoSpan.textContent = '0 / 0';
        currentFileNameSpan.textContent = '未生成';
        startBtn.disabled = false;
        startBtn.textContent = '🚀 生成二维码';
        showInfo('请选择一个文件');
        updateChunkEstimation();
    }
    fileInput.addEventListener('change', (e) => {
        file = e.target.files[0];
        if (file) {
            originalFileName = file.name;
            originalFileSize = file.size;
            fileNameSpan.textContent = originalFileName;
            fileSizeSpan.textContent = formatFileSize(originalFileSize);
            fileTypeSpan.textContent = file.type || '未知类型';
            fileFingerprint = generateShortFileId();
            fileFingerprintSpan.textContent = fileFingerprint;
            fingerprintInfoDiv.style.display = 'block';
            fileInfoDiv.style.display = 'block';
            updateChunkEstimation();
            showSuccess(`已选择: ${file.name}`);
        } else {
            fileInfoDiv.style.display = 'none';
            showInfo('请选择一个文件');
        }
    });
    chunkSizeSlider.addEventListener('input', () => {
        CONFIG.CHUNK_SIZE_BYTES = parseInt(chunkSizeSlider.value);
        chunkSizeValue.textContent = CONFIG.CHUNK_SIZE_BYTES + ' 字节';
        if (file) updateChunkEstimation();
    });
    qrSizeSlider.addEventListener('input', () => {
        CONFIG.QR_DISPLAY_SIZE = parseInt(qrSizeSlider.value);
        qrSizeValue.textContent = CONFIG.QR_DISPLAY_SIZE + ' px';
        qrCodeImages.forEach(img => {
            if (img && img.tagName === 'IMG') {
                img.style.width = CONFIG.QR_DISPLAY_SIZE + 'px';
                img.style.height = CONFIG.QR_DISPLAY_SIZE + 'px';
            }
        });
    });
    startBtn.addEventListener('click', async () => {
        if (!file) { showError('请先选择文件'); return; }
        if (typeof QRCode === 'undefined') { showError('QRCode库未加载'); return; }
        if (typeof pako === 'undefined') { showError('pako库未加载'); return; }
        if (typeof base45 === 'undefined') { showError('Base45库未加载'); return; }
        startBtn.disabled = true;
        startBtn.textContent = '生成中...';
        try {
            await generateAllQRCodes();
        } catch (err) {
            console.error(err);
            showError('生成失败: ' + err.message);
        } finally {
            startBtn.disabled = false;
            startBtn.textContent = '🚀 生成二维码';
        }
    });
    resetBtn.addEventListener('click', reset);
    bindEvents();
    reset();
</script>
</body>
</html>
